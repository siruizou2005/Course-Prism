services:
  db:
    image: postgres:16
    container_name: jcourse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jcourse}
      POSTGRES_USER: ${POSTGRES_USER:-jcourse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jcourse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jcourse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jcourse-network

  redis:
    image: redis:7-alpine
    container_name: jcourse-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jcourse-network

  backend:
    build:
      context: ./backend/jcourse_api-master
      dockerfile: Dockerfile
    container_name: jcourse-backend
    restart: unless-stopped
    command: ["gunicorn", "jcourse.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "2", "--timeout", "120"]
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_DB: ${POSTGRES_DB:-jcourse}
      POSTGRES_USER: ${POSTGRES_USER:-jcourse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jcourse}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
    volumes:
      - static_files:/app/static
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8010:8000"
    networks:
      - jcourse-network

  frontend:
    build:
      context: ./frontend/jcourse-master
      dockerfile: Dockerfile
      args:
        REMOTE_URL: http://backend:8000
    container_name: jcourse-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      REMOTE_URL: http://backend:8000
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - jcourse-network

volumes:
  postgres_data:
    name: jcourse-db-data
  redis_data:
    name: jcourse-redis-data
  static_files:
    name: jcourse-static-files
  media_files:
    name: jcourse-media-files

networks:
  jcourse-network:
    driver: bridge
